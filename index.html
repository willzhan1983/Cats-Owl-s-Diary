<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cats & Owl's Diary 3.0 - 森林学校帮帮忙</title>
    <link rel="icon" href="data:," />
    <link rel="preload" as="image" href="./assets/home-screen-fast.jpg?v=new-cover-20260626" fetchpriority="high" />
    <link rel="stylesheet" href="./style.css?v=home-menu-spacing-20260705" />
    <link rel="stylesheet" href="./world-map.css" />
    <link rel="stylesheet" href="./grade-quiz.css?v=home-menu-spacing-20260705" />
  </head>
  <body>
    <section id="homeScreen" class="home-screen" aria-label="Cats & Owl's Diary 首页">
      <img src="./assets/home-screen-fast.jpg?v=new-cover-20260626" alt="Cats & Owl's Diary 森林学校首页" decoding="async" fetchpriority="high" />
      <div class="home-menu">
        <div class="home-top-row">
          <button id="homeRecordsBtn" class="records-home-btn" type="button">📘 我的记录</button>
          <label class="player-profile" for="nicknameInput">
            <span>昵称</span>
            <input id="nicknameInput" type="text" maxlength="24" autocomplete="nickname" />
          </label>
        </div>
        <div class="difficulty-picker" aria-label="选择难度">
          <div class="difficulty-picker-title">选择难度 · 影响时间和扣时</div>
          <div class="difficulty-buttons">
            <button class="difficulty-btn" data-difficulty="easy" type="button">🌱 简单</button>
            <button class="difficulty-btn" data-difficulty="normal" type="button">🌼 普通</button>
            <button class="difficulty-btn" data-difficulty="hard" type="button">🔥 困难</button>
            <button class="difficulty-btn" data-difficulty="crazy" type="button">👑 疯狂</button>
          </div>
        </div>
        <div class="role-picker" aria-label="选择角色">
          <button class="role-btn is-selected" data-role="cat" type="button">Mimi / 詹涞儿</button>
          <button class="role-btn" data-role="owl" type="button">Owlly / 姚头鹰</button>
        </div>
        <button id="enterBtn" class="enter-btn" type="button">进入游戏</button>
      </div>
    </section>

    <main class="game-shell">
      <section class="game-panel" aria-label="森林学校帮帮忙小游戏">
        <div class="topbar">
          <div class="brand">
            <span class="brand-mark">C&O</span>
            <div>
              <h1>Cats & Owl's Diary <span class="version-tag">3.0</span></h1>
              <p>森林学校帮帮忙</p>
            </div>
          </div>
          <div class="stats" aria-live="polite">
            <span>日记 <strong id="level">第一天</strong></span>
            <span>爱心 <strong id="hearts">0</strong></span>
            <span>时间 <strong id="time">60</strong></span>
            <span>难度 <strong id="difficulty">普通</strong></span>
            <span>积分 <strong id="points">0 / 总分 0</strong></span>
            <span>任务 <strong id="tasks">0/3</strong></span>
            <span class="bag">背包 <strong id="bag">空</strong></span>
          </div>
          <div class="topbar-actions">
            <button id="worldMapBtn" class="map-btn" type="button" aria-haspopup="dialog">世界地图</button>
            <button id="recordsBtn" class="records-btn" type="button" aria-haspopup="dialog">📘 我的记录</button>
            <button id="soundBtn" class="sound-btn" type="button" aria-label="声音">♫</button>
            <button id="startBtn" type="button">开始</button>
          </div>
        </div>

        <div class="canvas-wrap">
          <canvas id="gameCanvas" width="960" height="540"></canvas>
          <div id="message" class="message">帮 Mimi / 詹涞儿 和 Owlly / 姚头鹰 完成森林学校任务。</div>
          <div id="quizPanel" class="quiz-panel" hidden>
            <div class="quiz-box">
              <h2 id="quizTitle">森林课堂</h2>
              <p id="quizQuestion"></p>
              <div id="quizOptions" class="quiz-options"></div>
            </div>
          </div>
          <div id="dialoguePanel" class="dialogue-panel" hidden>
            <div class="dialogue-card">
              <button id="dialogueCloseBtn" class="dialogue-close" type="button" aria-label="关闭对话">×</button>
              <div class="dialogue-speaker">
                <div id="dialogueAvatar" class="dialogue-avatar"></div>
                <div>
                  <strong id="dialogueName"></strong>
                  <span id="dialogueRole"></span>
                </div>
              </div>
              <p id="dialogueText"></p>
              <div class="dialogue-actions">
                <button id="dialogueNextBtn" type="button">下一句</button>
                <button id="dialogueGiveBtn" type="button" hidden>交给TA</button>
                <button id="dialogueQuizBtn" type="button" hidden>开始挑战</button>
              </div>
            </div>
          </div>
          <div id="storybookPanel" class="storybook-panel" hidden>
            <div class="storybook-card">
              <button id="storybookCloseBtn" class="storybook-close" type="button" aria-label="关闭绘本页">×</button>
              <div class="storybook-copy">
                <strong id="storybookTitle">今日绘本</strong>
                <span id="storybookCaption">读完这一页，再开始任务。</span>
              </div>
              <img id="storybookImage" src="./assets/storybook/fallback.png" alt="Cats & Owl's Diary 绘本页" decoding="async" />
              <button id="storybookStartBtn" class="storybook-start" type="button">开始任务</button>
            </div>
          </div>
        </div>

        <div class="controls" aria-label="移动按钮">
          <button data-dir="left" type="button" aria-label="向左">&lsaquo;</button>
          <button data-dir="up" type="button" aria-label="向上">&#8963;</button>
          <button data-dir="down" type="button" aria-label="向下">&#8964;</button>
          <button data-dir="right" type="button" aria-label="向右">&rsaquo;</button>
          <button id="dialogueBtn" class="dialogue-btn" type="button" aria-label="对话">对话</button>
          <button id="attackBtn" class="attack-btn" type="button" aria-label="动作">&#25915;&#20987;</button>
        </div>
      </section>
    </main>

    <section id="worldMapPanel" class="world-map-panel" role="dialog" aria-modal="true" aria-labelledby="worldMapTitle" hidden>
      <div class="world-map-card">
        <header class="world-map-header">
          <div>
            <h2 id="worldMapTitle">世界地图</h2>
            <p>Mimi / 詹涞儿 和 Owlly / 姚头鹰 的冒险路线</p>
          </div>
          <button class="world-map-close" type="button" data-world-close aria-label="关闭世界地图">×</button>
        </header>
        <div class="world-map-content">
          <div id="worldMapGrid" class="world-map-grid" aria-label="区域节点"></div>
          <aside id="worldMapDetail" class="world-map-detail" aria-live="polite"></aside>
        </div>
      </div>
    </section>

    <section id="scoreSummaryPanel" class="score-summary-panel" role="dialog" aria-modal="true" aria-labelledby="scoreSummaryTitle" hidden>
      <div class="score-summary-card">
        <header class="score-summary-header">
          <div>
            <h2 id="scoreSummaryTitle">关卡结算</h2>
            <p id="scoreSummarySubtitle"></p>
          </div>
          <button id="scoreSummaryCloseBtn" class="score-summary-close" type="button" aria-label="关闭结算">×</button>
        </header>
        <img id="scoreSummaryStorybookImage" class="score-summary-storybook" src="./assets/storybook/fallback.png" alt="Cats & Owl's Diary 通关绘本页" decoding="async" />
        <div id="scoreSummaryStats" class="score-summary-stats"></div>
        <div class="score-summary-actions">
          <button id="scoreContinueBtn" type="button">继续下一关</button>
          <button id="scoreRetryBtn" type="button">再玩一次</button>
          <button id="scoreRecordsBtn" type="button">查看记录</button>
        </div>
      </div>
    </section>

    <section id="runHistoryPanel" class="run-history-panel" role="dialog" aria-modal="true" aria-labelledby="runHistoryTitle" hidden>
      <div class="run-history-card">
        <header class="run-history-header">
          <div>
            <h2 id="runHistoryTitle">我的记录</h2>
            <p id="runHistorySummary"></p>
          </div>
          <button id="runHistoryCloseBtn" class="run-history-close" type="button" aria-label="关闭记录">×</button>
        </header>
        <div id="runHistoryList" class="run-history-list"></div>
        <div class="run-history-actions">
          <button id="clearHistoryBtn" type="button">清除本地记录</button>
        </div>
      </div>
    </section>

    <script src="./game.js?v=mist-swamp-final-20260720c"></script>
    <script src="./background-fixes.js?v=school-bg-20260629"></script>
    <script src="./grade-upper-quiz-bank.js"></script>
    <script src="./moonlight-quiz-bank.js?v=shared-pool-20260629"></script>
    <script src="./apple-valley-quiz-bank.js?v=shuffle-bag-20260706"></script>
    <script src="./forest-road-quiz-bank.js?v=forest-road-quiz-20260711"></script>
    <script src="./mist-swamp-quiz-bank.js?v=mist-swamp-final-20260720c"></script>
    <script src="./grade-quiz.js?v=mist-swamp-final-20260720c"></script>
    <script src="./remove-puddles.js?v=remove-puddles-20260629"></script>
    <script src="./art-assets.js?v=mist-swamp-final-20260720c"></script>
    <script src="./life.js"></script>
    <script src="./world-map.js"></script>
    <script src="./forest-school-map-entry.js"></script>
    <script src="./moonlight-map-entry.js"></script>
    <script src="./apple-valley-map-entry.js"></script>
    <script src="./forest-road-map-entry.js"></script>
    <script src="./mist-swamp-map-entry.js"></script>
  </body>
</html>
